<html lang="zh-TW">
<link rel="stylesheet" href="style.css">
<head>
    <script type="module">
    
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDMCzDtnjy690t9vqLap8zWCnBlz-qURc0",
          authDomain: "pick-up-food.firebaseapp.com",
          databaseURL: "https://pick-up-food-default-rtdb.asia-southeast1.firebasedatabase.app/",
          projectId: "pick-up-food",
          storageBucket: "pick-up-food.firebasestorage.app",
          messagingSenderId: "614546159516",
          appId: "1:614546159516:web:af51ed007e7e475539fa59",
          measurementId: "G-057863SWXH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const cloudData = ref(db, 'historyTime');

        window.Update = (data) => set(cloudData, data);

        onValue(cloudData, (d) => {
            const data = d.val();
            if (data) {
                window.historyTime = data || []; 
                if (typeof updateList == "function") updateList(); 
            }
            
            const loading = document.getElementById("loading-screen");
            if(loading) loading.style.display = "none";
        },(error) => {
            console.error("Firebase 連線錯誤：", error);
            // 出錯也要關掉圈圈，不然會卡死
            document.getElementById("loading-screen").style.display = "none";
        });
    
    </script>

    <title>取餐抽籤系統</title>
    
</head>
    
<body>
    <script src="main.js"></script>

    <div id="loading-screen">
    
    <div class="loader"></div>
        
    <p style="margin-top: 20px; font-family: sans-serif; color: #555;">正在載入取餐紀錄...</p>
  </div>
  <div id = "title-box">
    <h1>取餐抽籤系統</h1>
  </div>  
  <div id = "input-box">
    <textarea id="foodListInput" placeholder="請在此貼上訂餐清單..." rows="10" cols="50"></textarea>
  </div>
  <div id = "draw-btn">  
    <button onclick="UserInput(1)">抽 1 人</button>
    <button onclick="UserInput(2)">抽 2 人</button>
    <button onclick="UserInput(3)">抽 3 人</button>
    <button onclick="UserInput(4)">抽 4 人</button>
  </div>    
  <div>

    <button onclick="numAdd()">手動加入名單</button>
  </div>
  
  <div class="history">
    <h2>取餐紀錄</h2>
  </div>
    
  <div id="pickedList">目前無人取餐</div>
</body>
